<!DOCTYPE html>
<html>
<head>
  <title>GoalAI</title>
  <style>
    body { font-family: Arial; text-align:center; background:#1e1e2f; color:#fff; }
    button { padding:10px 20px; font-size:18px; margin:10px; cursor:pointer; }
    .xp { font-size:20px; margin:15px; }
    .message { margin:20px; font-size:18px; color:#ffcc00; }
    #popup { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:flex; flex-direction:column; align-items:center; justify-content:center; }
    #popup span { position:absolute; top:20px; right:20px; font-size:24px; cursor:pointer; color:#fff; }
    #metaForm { display:none; flex-direction:column; align-items:center; }
    input { margin:10px; padding:8px; font-size:16px; width:200px; }
  </style>
</head>
<body>

<h1>GoalAI</h1>

<div id="popup">
  <span id="cerrar">X</span>
  <h2>Gratis vs Premium</h2>
  <p>Gratis: 1 meta, IA limitada</p>
  <p>Premium: metas ilimitadas, IA ilimitada</p>
  <button id="premium">Hazte Premium</button>
</div>

<div class="xp">Nivel: <span id="nivel">1</span> | XP: <span id="xp">0</span></div>
<div class="message" id="mensaje">Empieza tu primera meta 🔥</div>

<form id="metaForm">
  <input type="text" id="meta" placeholder="Tu meta" required>
  <input type="number" id="tiempo" placeholder="Minutos diarios" required>
  <button type="submit">Generar plan</button>
</form>

<script src="script.js"></script>
</body>
</html>
